<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アカウント乗っ取りシミュレーター</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Share+Tech+Mono&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --white:#ffffff;--bg:#f4f2ee;--bg2:#ede9e3;--surface:#ffffff;--surface2:#faf9f7;
  --border:#ddd9d0;--border2:#c8c2b8;--text:#1a1814;--text2:#4a453e;--text3:#8a847a;
  --red:#d93025;--red-light:#fde8e6;--red-mid:#f5c3be;
  --orange:#e06c1a;--orange-light:#fef0e3;
  --yellow:#c89600;--yellow-light:#fdf6dc;
  --green:#1a7a40;--green-light:#e6f4ec;
  --blue:#1a5fa8;--blue-light:#e6f0fb;
  --purple:#6b3fa0;--purple-light:#f0eafa;
  --mono:'Share Tech Mono',monospace;
  --sans:'Noto Sans JP',sans-serif;
  --display:'Syne',sans-serif;
  --sh-sm:0 1px 4px rgba(0,0,0,0.08);
  --sh:0 4px 16px rgba(0,0,0,0.1);
  --sh-lg:0 12px 40px rgba(0,0,0,0.14);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;-webkit-font-smoothing:antialiased}

/* HEADER */
.app-header{background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:var(--sh-sm)}
.header-left{display:flex;align-items:center;gap:12px}
.header-badge{background:var(--red);color:white;font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:3px;letter-spacing:1px}
.header-title{font-size:14px;font-weight:700;color:var(--text2)}
.home-btn{padding:6px 16px;border-radius:20px;border:1.5px solid var(--border);background:transparent;font-family:var(--sans);font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;transition:all .2s;display:none}
.home-btn:hover{border-color:var(--border2);color:var(--text)}

/* SCREENS */
.screen{display:none}
.screen.active{display:block}

/* TITLE SCREEN */
#screen-title{min-height:calc(100vh - 56px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px 40px;text-align:center;background:var(--bg);position:relative;overflow:hidden}
.title-grid-bg{position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,var(--border) 39px,var(--border) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,var(--border) 39px,var(--border) 40px);opacity:.35;pointer-events:none}
.title-h1{font-family:var(--display);font-size:clamp(36px,7vw,76px);font-weight:800;line-height:1.0;letter-spacing:-1px;margin-bottom:12px}
.title-h1 .accent{color:var(--red);display:block}
.title-desc{font-size:14px;color:var(--text3);max-width:440px;margin:0 auto 28px;line-height:1.7}
.mode-cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.mode-card{background:var(--white);border:2px solid var(--border);border-radius:16px;padding:22px 20px;cursor:pointer;transition:all .25s;width:170px;text-align:center;box-shadow:var(--sh-sm);position:relative;overflow:hidden}
.mode-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;opacity:0;transition:opacity .2s}
.mode-card.victim::after{background:linear-gradient(90deg,var(--orange),var(--red))}
.mode-card.hacker::after{background:linear-gradient(90deg,#a00020,#c00030)}
.mode-card.econ::after{background:linear-gradient(90deg,var(--green),#0a5a28)}
.mode-card:hover{transform:translateY(-4px);box-shadow:var(--sh-lg);border-color:var(--border2)}
.mode-card:hover::after{opacity:1}
.mc-icon{font-size:36px;margin-bottom:10px;display:block}
.mc-label{font-size:13px;font-weight:700;margin-bottom:4px}
.mc-sub{font-size:11px;color:var(--text3)}
.title-scroll-hint{margin-top:20px;font-size:11px;color:var(--text3);font-family:var(--mono);letter-spacing:1px;opacity:.6;animation:hintBob 2s ease-in-out infinite}
@keyframes hintBob{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}

/* GAME SCREEN */
#screen-game.active{display:block;min-height:calc(100vh - 56px)}

/* PROGRESS */
.progress-wrap{background:var(--white);border-bottom:1px solid var(--border);padding:14px 28px;position:sticky;top:56px;z-index:100}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.progress-mode{font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:3px 10px;border-radius:100px;border:1.5px solid}
.progress-counter{font-size:12px;color:var(--text3);font-family:var(--mono)}
.progress-track{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}
.progress-bar{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.34,1.56,.64,1)}
.dots-row{display:flex;gap:5px;justify-content:center;margin-top:8px}
.dot-pip{width:8px;height:8px;border-radius:4px;background:var(--border);transition:all .3s}
.dot-pip.done{background:var(--border2)}
.dot-pip.active{width:22px}

/* PHASE CONTAINER */
.phase-wrap{max-width:760px;margin:0 auto;padding:36px 24px 0}

/* PHASE CARD */
.phase-card{background:var(--white);border-radius:20px;box-shadow:var(--sh);overflow:hidden;animation:cardIn .4s cubic-bezier(.22,1,.36,1) both}
@keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.phase-head{padding:26px 30px 22px;border-bottom:1px solid var(--border);position:relative}
.phase-step-tag{font-family:var(--mono);font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.step-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.phase-title{font-family:var(--display);font-size:clamp(18px,3.5vw,26px);font-weight:700;line-height:1.3}
.phase-num-bg{position:absolute;right:24px;top:16px;font-family:var(--display);font-size:88px;line-height:1;opacity:.05;pointer-events:none}
.phase-body{padding:26px 30px}
.phase-desc{font-size:15px;line-height:1.9;color:var(--text2);margin-bottom:22px}

/* EMAIL MOCKUP */
.email-mock{background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;margin:16px 0}
.email-bar{background:var(--bg2);padding:9px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.em-dots{display:flex;gap:5px}
.em-dot{width:10px;height:10px;border-radius:50%}
.em-app{font-size:12px;color:var(--text3);font-weight:600;margin-left:4px}
.email-inner{padding:14px 18px}
.em-row{display:flex;gap:10px;margin-bottom:7px;font-size:13px}
.em-lbl{color:var(--text3);width:55px;flex-shrink:0;font-weight:500}
.em-val{color:var(--text)}
.em-val.danger{color:var(--red);font-family:var(--mono);font-size:11.5px}
.em-val.warn{color:var(--orange)}
.em-hr{height:1px;background:var(--border);margin:10px 0}
.em-body{font-size:13px;color:var(--text2);line-height:1.8}
.em-cta{display:inline-block;margin-top:12px;background:#ff9900;color:white;font-size:13px;font-weight:700;padding:9px 22px;border-radius:6px;cursor:default}
.em-phish{display:inline-flex;align-items:center;gap:5px;background:var(--red-light);border:1px solid var(--red-mid);color:var(--red);font-size:11px;font-family:var(--mono);padding:3px 9px;border-radius:4px;margin-top:8px}

/* PHONE MOCKUP */
.phone-mock{background:#1c1c1e;border-radius:34px;padding:22px 18px;max-width:320px;margin:18px auto;box-shadow:0 20px 60px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.1)}
.phone-notch{width:96px;height:24px;background:#000;border-radius:12px;margin:0 auto 18px;display:flex;align-items:center;justify-content:center}
.phone-cam{width:9px;height:9px;border-radius:50%;background:#111;border:1px solid #333}
.phone-time{text-align:center;color:white;font-size:50px;font-weight:200;letter-spacing:-2px;margin-bottom:3px}
.phone-date{text-align:center;color:rgba(255,255,255,.65);font-size:13px;margin-bottom:18px}
.notif-card{background:rgba(255,255,255,.14);backdrop-filter:blur(20px);border-radius:14px;padding:11px 14px;display:flex;gap:10px;margin-bottom:7px;animation:notifDrop .5s cubic-bezier(.22,1,.36,1) both;border:1px solid rgba(255,255,255,.1)}
@keyframes notifDrop{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
.notif-ico{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.notif-txt{flex:1}
.notif-app{font-size:10px;color:rgba(255,255,255,.55);margin-bottom:2px}
.notif-h{font-size:13px;font-weight:600;color:white;margin-bottom:1px}
.notif-b{font-size:11.5px;color:rgba(255,255,255,.65);line-height:1.4}
.notif-t{font-size:10px;color:rgba(255,255,255,.35);flex-shrink:0;align-self:flex-start}

/* TERMINAL */
.terminal{background:#1e1e2e;border-radius:12px;overflow:hidden;margin:16px 0;box-shadow:var(--sh)}
.term-bar{background:#2a2a3e;padding:9px 16px;display:flex;align-items:center;gap:7px;border-bottom:1px solid rgba(255,255,255,.05)}
.term-dot{width:10px;height:10px;border-radius:50%}
.term-name{font-size:12px;color:rgba(255,255,255,.35);margin-left:8px;font-family:var(--mono)}
.term-body{padding:14px 18px;font-family:var(--mono);font-size:12.5px;line-height:2}
.t-line{display:flex;gap:7px}
.t-prompt{color:#50fa7b;flex-shrink:0}
.t-cmd{color:#f8f8f2}
.t-out{color:#6272a4}
.t-ok{color:#50fa7b}
.t-warn{color:#ffb86c}
.t-err{color:#ff5555}
.t-info{color:#8be9fd}

/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:18px 0}
.stat-box{background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;text-align:center}
.stat-v{font-family:var(--display);font-size:26px;line-height:1.1;margin-bottom:4px}
.stat-l{font-size:11px;color:var(--text3);font-weight:500}

/* INFO NOTE */
.info-note{border-radius:10px;padding:12px 16px;font-size:13px;line-height:1.8;display:flex;gap:10px;margin:14px 0}
.in-icon{flex-shrink:0;font-size:15px;margin-top:2px}
.info-note.warn{background:var(--yellow-light);border:1px solid #e8d000;color:#5a4000}
.info-note.danger{background:var(--red-light);border:1px solid var(--red-mid);color:#7a0010}
.info-note.tip{background:var(--blue-light);border:1px solid #a8c8f0;color:#0a3060}
.info-note.good{background:var(--green-light);border:1px solid #a0d8b8;color:#0a4020}

/* TAGS */
.tags{display:flex;flex-wrap:wrap;gap:7px;margin:14px 0}
.tag{padding:4px 11px;border-radius:100px;font-size:11.5px;font-weight:600;border:1.5px solid}
.tag.red{background:var(--red-light);color:var(--red);border-color:var(--red-mid)}
.tag.orange{background:var(--orange-light);border-color:#f0c090;color:var(--orange)}
.tag.purple{background:var(--purple-light);border-color:#c8a8e8;color:var(--purple)}
.tag.green{background:var(--green-light);border-color:#a0d8b8;color:var(--green)}
.tag.blue{background:var(--blue-light);border-color:#a8c8f0;color:var(--blue)}

/* RIPPLE */
.ripple-wrap{position:relative;height:280px;display:flex;align-items:center;justify-content:center;margin:18px 0;background:var(--surface2);border-radius:16px;border:1.5px solid var(--border);overflow:hidden}
.r-ring{position:absolute;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);border:1.5px solid rgba(217,48,37,.22);animation:rRipple 3s ease-out infinite;pointer-events:none}
.r-ring:nth-child(1){width:76px;height:76px;animation-delay:0s}
.r-ring:nth-child(2){width:156px;height:156px;animation-delay:.9s}
.r-ring:nth-child(3){width:256px;height:256px;animation-delay:1.8s}
@keyframes rRipple{0%{opacity:.9;transform:translate(-50%,-50%) scale(.7)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.1)}}
.r-center{position:relative;z-index:10;text-align:center;background:var(--red-light);border:2px solid var(--red-mid);border-radius:50%;width:68px;height:68px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.r-ico{font-size:22px}
.r-lbl{font-size:8px;font-family:var(--mono);color:var(--red)}
.r-svc{position:absolute;display:flex;flex-direction:column;align-items:center;gap:2px;animation:rFloat 3.5s ease-in-out infinite}
.r-svc .ri{font-size:20px}
.r-svc .rl{font-size:9px;font-family:var(--mono);background:var(--red-light);color:var(--red);padding:1px 5px;border-radius:3px;border:1px solid var(--red-mid)}
@keyframes rFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.rs1{top:8%;left:6%}.rs2{top:6%;right:8%}.rs3{bottom:10%;left:5%}.rs4{bottom:8%;right:6%}
.rs5{top:50%;left:2%;transform:translateY(-50%)}.rs6{top:50%;right:2%;transform:translateY(-50%)}
.rs7{top:1%;left:38%}.rs8{bottom:1%;left:38%}

/* TABLE */
.data-table{width:100%;border-collapse:collapse;font-size:13px;margin:14px 0}
.data-table th{background:var(--bg2);padding:10px 14px;text-align:left;font-size:11px;font-family:var(--mono);letter-spacing:1px;color:var(--text3);border-bottom:1.5px solid var(--border)}
.data-table td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.data-table tr:hover td{background:var(--surface2)}
.vg{color:var(--green);font-family:var(--mono);font-weight:700}
.vr{color:var(--red);font-family:var(--mono)}
.v-roi{font-family:var(--mono);font-weight:700;font-size:12px;background:var(--green-light);color:var(--green);padding:2px 8px;border-radius:4px}

/* BAR CHART */
.bars{margin:16px 0}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bar-lbl{width:128px;font-size:12px;color:var(--text2);text-align:right;flex-shrink:0}
.bar-track{flex:1;background:var(--bg2);border-radius:4px;height:28px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding:0 12px;font-family:var(--mono);font-size:11px;font-weight:700;color:white;animation:bGrow .8s cubic-bezier(.34,1.2,.64,1) both;transform-origin:left;white-space:nowrap}
@keyframes bGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}

/* DEFENSE */
.def-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;margin:16px 0}
.def-card{background:var(--surface2);border:1.5px solid var(--border);border-left:4px solid var(--green);border-radius:10px;padding:14px 16px}
.def-i{font-size:22px;margin-bottom:8px}
.def-t{font-size:13px;font-weight:700;color:var(--green);margin-bottom:5px}
.def-d{font-size:12px;color:var(--text2);line-height:1.7}

/* ACTION AREA — inline at bottom of content, not fixed */
.action-area{display:flex;justify-content:center;gap:10px;padding:32px 24px 48px;max-width:760px;margin:0 auto}
.action-area.hidden{display:none}
.act-btn{display:flex;align-items:center;gap:10px;padding:14px 32px;border-radius:14px;border:none;font-family:var(--sans);font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:var(--sh);position:relative;overflow:hidden}
.act-btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.18);opacity:0;transition:opacity .15s}
.act-btn:hover::after{opacity:1}
.act-btn:active{transform:scale(.97)}
.act-btn.primary{background:var(--text);color:white}
.act-btn.danger{background:var(--red);color:white}
.act-btn.orange{background:var(--orange);color:white}
.act-btn.green{background:var(--green);color:white}
.act-btn.back{background:var(--white);color:var(--text2);border:1.5px solid var(--border);box-shadow:var(--sh-sm);padding:15px 22px}
.btn-arr{font-size:18px;transition:transform .2s}
.act-btn:hover .btn-arr{transform:translateX(4px)}

/* FLASH */
.flash{display:none;position:fixed;inset:0;background:rgba(217,48,37,.07);pointer-events:none;z-index:400;animation:flashA .45s ease-out both}
@keyframes flashA{0%{opacity:1}100%{opacity:0}}

/* TYPEWRITER cursor blink on desc */
.phase-desc::after{content:'▋';display:inline-block;animation:twCursor .7s step-end infinite;opacity:0}
.phase-desc.typing::after{opacity:1}
@keyframes twCursor{0%,100%{opacity:1}50%{opacity:0}}

/* COMPLETE */
.complete-card{background:var(--white);border-radius:20px;padding:44px 32px;text-align:center;box-shadow:var(--sh-lg);animation:cardIn .4s cubic-bezier(.22,1,.36,1) both;margin-top:24px}
.comp-ico{font-size:60px;margin-bottom:14px;display:block}
.comp-title{font-family:var(--display);font-size:30px;font-weight:700;margin-bottom:12px}
.comp-desc{font-size:15px;color:var(--text2);line-height:1.85;margin-bottom:30px;max-width:460px;margin-left:auto;margin-right:auto}
.comp-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.comp-btn{padding:13px 28px;border-radius:12px;border:2px solid var(--border);background:var(--white);font-family:var(--sans);font-size:14px;font-weight:700;color:var(--text);cursor:pointer;transition:all .2s}
.comp-btn:hover{background:var(--bg2)}
.comp-btn.filled{background:var(--text);color:white;border-color:var(--text)}

/* COLOR THEMING per mode */
.mode-victim .progress-mode{color:var(--red);border-color:var(--red-mid);background:var(--red-light)}
.mode-victim .dot-pip.active{background:var(--red)}
.mode-victim .dot-pip.done{background:var(--red-mid)}
.mode-victim .progress-bar{background:linear-gradient(90deg,var(--orange),var(--red))}

.mode-hacker .progress-mode{color:#8a0010;border-color:#e8a0a0;background:#fff0f0}
.mode-hacker .dot-pip.active{background:#a00020}
.mode-hacker .dot-pip.done{background:#e0a0a8}
.mode-hacker .progress-bar{background:linear-gradient(90deg,#b00020,#800010)}

.mode-econ .progress-mode{color:var(--green);border-color:#a0d8b8;background:var(--green-light)}
.mode-econ .dot-pip.active{background:var(--green)}
.mode-econ .dot-pip.done{background:#80c09a}
.mode-econ .progress-bar{background:linear-gradient(90deg,#1a8a40,var(--green))}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

@media(max-width:600px){
  .phase-wrap{padding:20px 14px 0}
  .phase-head,.phase-body{padding:18px}
  .mode-cards{gap:10px}
  .mode-card{width:140px;padding:24px 16px}
}
</style>
</head>
<body>

<div class="flash" id="flash"></div>

<header class="app-header">
  <div class="header-left">
    <div class="header-title">セキュリティシミュレーター</div>
  </div>
  <button class="home-btn" id="homeBtn" onclick="goHome()">← ホームに戻る</button>
</header>

<!-- ████ TITLE ████ -->
<div class="screen active" id="screen-title">
  <div class="title-grid-bg"></div>
  <h1 class="title-h1">ACCOUNT<span class="accent">TAKEOVER</span></h1>
  <p class="title-desc">アカウントが乗っ取られると何が起きるのか。<br>視点を選んで、リアルな体験から学ぼう。</p>
  <div class="mode-cards">
    <div class="mode-card victim" onclick="startMode('victim')">
      <span class="mc-icon">😰</span>
      <div class="mc-label">被害者の体験</div>
      <div class="mc-sub">5フェーズで追体験</div>
    </div>
    <div class="mode-card hacker" onclick="startMode('hacker')">
      <span class="mc-icon">🕶️</span>
      <div class="mc-label">攻撃者の手口</div>
      <div class="mc-sub">6ステップ解説</div>
    </div>
    <div class="mode-card econ" onclick="startMode('econ')">
      <span class="mc-icon">💰</span>
      <div class="mc-label">攻撃の経済学</div>
      <div class="mc-sub">なぜ攻撃するのか</div>
    </div>
  </div>
  <div class="title-scroll-hint">▼ クリックしてスタート</div>
</div>

<!-- ████ GAME ████ -->
<div class="screen" id="screen-game">
  <div id="game-anchor" style="position:relative;top:0"></div>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-top">
      <span class="progress-mode" id="progressLabel">—</span>
      <span class="progress-counter" id="progressCounter">1 / 1</span>

/* ===== ENGINE ===== */
let curMode=null, curIdx=0;

function goHome(){
  document.getElementById('screen-title').classList.add('active');
  document.getElementById('screen-game').classList.remove('active');
  document.getElementById('homeBtn').style.display='none';
  window.scrollTo({top:0,behavior:'smooth'});
}

function startMode(mode){
  curMode=mode; curIdx=0;
  const gs=document.getElementById('screen-game');
  gs.className='screen active '+MODES[mode].cls;
  document.getElementById('screen-title').classList.remove('active');
  document.getElementById('homeBtn').style.display='block';
  document.getElementById('progressLabel').textContent=MODES[mode].label;
  // Build dots
  const dr=document.getElementById('dotRow');
  dr.innerHTML='';
  MODES[mode].phases.forEach(()=>{
    const d=document.createElement('div');d.className='dot-pip';dr.appendChild(d);
  });
  renderPhase(0);
  // Scroll to game screen top after short delay (let DOM render)
  setTimeout(()=>{
    const anchor=document.getElementById('game-anchor');
    if(anchor){
      const y=anchor.getBoundingClientRect().top+window.scrollY-56;
      window.scrollTo({top:y,behavior:'smooth'});
    }
  },80);
}

/* ── TYPEWRITER ── */
function typewriterEffect(el, text, speed, onDone){
  el.textContent='';
  el.classList.add('typing');
  let i=0;
  const tick=()=>{
    if(i<text.length){
      el.textContent+=text[i++];
      setTimeout(tick, speed);
    } else {
      el.classList.remove('typing');
      if(onDone) onDone();
    }
  };
  tick();
}

function renderPhase(idx){
  const data=MODES[curMode];
  const ph=data.phases[idx];
  const total=data.phases.length;

  // Progress
  document.getElementById('progressBar').style.width=((idx+1)/total*100)+'%';
  document.getElementById('progressCounter').textContent=`${idx+1} / ${total}`;
  document.querySelectorAll('.dot-pip').forEach((d,i)=>{
    d.className='dot-pip'+(i<idx?' done':'')+(i===idx?' active':'');
  });

  const wrap=document.getElementById('phaseWrap');
  const area=document.getElementById('actionArea');

  const cardHTML=`
    <div class="phase-card">
      <div class="phase-head">
        <div class="phase-step-tag">
          <span class="step-dot" style="background:${ph.stepColor}"></span>
          ${ph.step}
        </div>
        <div class="phase-title">${ph.title}</div>
        <div class="phase-num-bg">${String(idx+1).padStart(2,'0')}</div>
      </div>
      <div class="phase-body">
        <div class="phase-desc" id="phaseDescEl"></div>
        <div id="phaseHtmlMount"></div>
      </div>
    </div>
  `;

  if(ph.isLast){
    wrap.innerHTML=cardHTML+`<div id="completeCardMount"></div>`;
    area.innerHTML='';
    area.classList.add('hidden');
  } else {
    wrap.innerHTML=cardHTML;
    area.classList.remove('hidden');
    const a=ph.action;
    area.innerHTML=`
      ${idx>0?`<button class="act-btn back" onclick="goPrev()">← 戻る</button>`:''}
      <button class="act-btn ${a.color}" id="nextBtn" onclick="goNext()" style="opacity:0;pointer-events:none;transition:opacity .5s ease">
        <span>${a.icon}</span>
        <span>${a.label}</span>
        <span class="btn-arr">›</span>
      </button>`;
  }

  // Scroll to top of phase
  const progressEl=document.getElementById('progressWrap');
  if(progressEl){
    const y=progressEl.getBoundingClientRect().bottom+window.scrollY-2;
    window.scrollTo({top:y,behavior:'smooth'});
  }

  // Parse ph.html into DOM nodes and inject as hidden blocks
  const mount=document.getElementById('phaseHtmlMount');
  if(mount){
    const tmp=document.createElement('div');
    tmp.innerHTML=ph.html;
    // Each top-level child becomes a slide block
    const nodes=[...tmp.children];
    nodes.forEach(node=>{
      node.classList.add('pcb'); // phase-content-block via JS class
      node.style.opacity='0';
      node.style.transform='translateY(18px)';
      node.style.transition='opacity .5s ease, transform .5s ease';
      mount.appendChild(node);
    });
  }

  // Re-trigger bar animations after slide-in
  // (done inside the slide callback below)

  // ── TYPEWRITER then SLIDE-IN ──
  const descEl=document.getElementById('phaseDescEl');
  if(descEl){
    const descText=ph.desc;
    const charSpeed=Math.min(28, Math.round(1200/descText.length));
    typewriterEffect(descEl, descText, charSpeed, ()=>{
      // slide in each block sequentially
      const blocks=mount ? [...mount.children] : [];
      blocks.forEach((b,i)=>{
        setTimeout(()=>{
          b.style.opacity='1';
          b.style.transform='translateY(0)';
          // re-trigger bars inside this block
          b.querySelectorAll('.bar-fill').forEach(bf=>{
            bf.style.animation='none';
            void bf.offsetWidth;
            bf.style.animation='';
          });
        }, 60 + i*160);
      });

      // complete card
      if(ph.isLast){
        const ccMount=document.getElementById('completeCardMount');
        if(ccMount){
          ccMount.innerHTML=`
            <div class="complete-card" style="opacity:0;transform:translateY(18px);transition:opacity .5s ease,transform .5s ease">
              <span class="comp-ico">${ph.completeIcon}</span>
              <div class="comp-title">${ph.completeTitle}</div>
              <p class="comp-desc">${ph.completeDesc}</p>
              <div class="comp-btns">
                <button class="comp-btn" onclick="startMode('${curMode}')">🔄 最初からやり直す</button>
                <button class="comp-btn filled" onclick="goHome()">🏠 他のモードを選ぶ</button>
              </div>
            </div>`;
          setTimeout(()=>{
            const cc=ccMount.firstElementChild;
            if(cc){cc.style.opacity='1';cc.style.transform='translateY(0)';}
          }, 60+blocks.length*160);
        }
      }

      // Show next button after all blocks
      const delay=60+blocks.length*160+200;
      setTimeout(()=>{
        const nb=document.getElementById('nextBtn');
        if(nb){nb.style.opacity='1';nb.style.pointerEvents='auto';}
      }, delay);
    });
  }
}

function goNext(){
  const f=document.getElementById('flash');
  f.style.display='block';
  setTimeout(()=>f.style.display='none',450);
  curIdx++;
  renderPhase(curIdx);
}
function goPrev(){
  if(curIdx>0){curIdx--;renderPhase(curIdx);}
}
</script>
</body>
</html>
